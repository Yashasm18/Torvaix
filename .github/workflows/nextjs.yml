name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
      - name: Install dependencies
        run: npm ci
      - name: Prepare Static Export
        run: |
          node -e "const fs=require('fs'); fs.rmSync('apps/web/src/app/(workspace)', {recursive:true, force:true}); fs.rmSync('apps/web/src/app/api', {recursive:true, force:true});"
      - name: Build with Next.js
        run: |
          node -e "
            const fs = require('fs');
            const configPath = 'apps/web/next.config.ts';
            const config = fs.readFileSync(configPath, 'utf8');
            fs.writeFileSync(
              configPath,
              config.replace(
                'output: \"standalone\"',
                'output: \"export\",\n  basePath: \"/Torvaix\"'
              )
            );
          "
          npm run build --workspace=web
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
